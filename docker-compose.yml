services:
  postgres:
    image: postgres:16
    container_name: ret_postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-renewable_energy}
      POSTGRES_USER: ${POSTGRES_USER:-renewable}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-renewable123}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-renewable}"]
      interval: 5s
      timeout: 5s
      retries: 5

  kestra:
    image: kestra/kestra:latest
    container_name: ret_kestra
    command: server standalone
    environment:
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-renewable_energy}
            username: ${POSTGRES_USER:-renewable}
            password: ${POSTGRES_PASSWORD:-renewable123}
        kestra:
          repository:
            type: postgres
          queue:
            type: postgres
          storage:
            type: local
            local:
              basePath: /app/storage
    ports:
      - "${KESTRA_PORT:-8080}:8080"
    volumes:
      - kestra_data:/app/storage
      - ./kestra/flows:/app/flows
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  kestra_data:
