version: 2

sources:
  - name: raw
    schema: public
    tables:
      - name: raw_daily_production
        description: "Raw daily energy production data from ENTSO-E API"
        columns:
          - name: id
            description: "Auto-incremented primary key"
            tests: [not_null]
          - name: country_code
            description: "ISO 2-letter country code"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_be_in_set:
                  value_set: ['DE', 'FR', 'ES', 'DK', 'NO', 'NL']
              - dbt_expectations.expect_column_value_lengths_to_equal:
                  value: 2
              - dbt_expectations.expect_column_values_to_match_regex:
                  regex: "^[A-Z]{2}$"
          - name: source_code
            description: "ENTSO-E production type code (B01-B23)"
            tests:
              - not_null
              - dbt_expectations.expect_column_values_to_match_regex:
                  regex: "^B\\d{2}$"
          - name: production_date
            description: "Date of energy production"
            tests: [not_null]
          - name: production_mwh
            description: "Energy produced in megawatt-hours"
            tests: [not_null]
          - name: fetched_at
            description: "Timestamp when data was fetched from API"
            tests:
              - dbt_expectations.expect_row_values_to_have_recent_data:
                  datepart: day
                  interval: 3