              value_set: ['renewable', 'fossil', 'nuclear', 'other']
      - name: emissions_mtco2
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: share_of_emissions_pct
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
      - name: period
        tests: [not_null]
    tests:
      - dbt_expectations.expect_grouped_row_values_to_have_recent_data:
          group_by: [country_code]
