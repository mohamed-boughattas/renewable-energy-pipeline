      - name: fossil_emissions_mtco2
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
    tests:
      - dbt_expectations.expect_compound_columns_to_be_unique:
          column_list: ["country_code", "year_month"]

  - name: mart_monthly_carbon_intensity_summary
    description: "Monthly carbon intensity aggregates per country"
    columns:
      - name: country_code
        tests: [not_null]
      - name: country_name
        tests: [not_null]
      - name: region
        tests: [not_null]
      - name: year_month
        tests: [not_null]
      - name: avg_intensity_gco2_per_kwh
        tests:
          - dbt_expectations.expect_column_values_to_be_between:
