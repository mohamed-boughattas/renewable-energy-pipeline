version: 2

models:
  - name: slv_daily_production
    description: "Cleaned daily production with country and source details"
    columns:
      - name: id
        tests: [not_null, unique]
      - name: country_code
        tests:
          - not_null
          - relationships:
              to: ref('countries')
              field: code
          - dbt_expectations.expect_column_values_to_match_regex:
              regex: "^[A-Z]{2}$"
      - name: source_code
        tests:
          - not_null
          - relationships:
              to: ref('energy_sources')
              field: code
      - name: category
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_in_set:
              value_set: ['renewable', 'fossil', 'nuclear', 'other']
      - name: production_mwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
    tests:
      - dbt_expectations.expect_grouped_row_values_to_have_recent_data:
          group_by: [country_code]
          timestamp_column: production_date
          datepart: day
          interval: 3

  - name: slv_daily_renewable_share
    description: "Daily renewable share per country"
    columns:
      - name: country_code
        tests: [not_null]
      - name: production_date
        tests: [not_null]
      - name: renewable_mwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: fossil_mwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: nuclear_mwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: total_mwh
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
      - name: renewable_share_pct
        tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_between:
              min_value: 0
              max_value: 100
    tests:
      - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
          column_A: total_mwh
          column_B: renewable_mwh
          or_equal: true
      - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
          column_A: total_mwh
          column_B: fossil_mwh
          or_equal: true
      - dbt_expectations.expect_column_pair_values_A_to_be_greater_than_B:
          column_A: total_mwh
          column_B: nuclear_mwh
          or_equal: true
      - dbt_expectations.expect_compound_columns_to_be_unique:
          column_list: ["country_code", "production_date"]
      - dbt_expectations.expect_row_values_to_have_data_for_every_n_datepart:
          date_col: production_date
          date_part: day
          group_by: [country_code]