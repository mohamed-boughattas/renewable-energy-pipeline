checks for raw_daily_production:
  - row_count > 0:
      name: Table is not empty

  - freshness(production_date) < 2d:
      name: Data arrived within last 2 days

  - missing_count(country_code) = 0:
      name: No missing country codes

  - missing_count(source_code) = 0:
      name: No missing source codes

  - missing_count(production_date) = 0:
      name: No missing production dates

  - missing_count(production_mwh) = 0:
      name: No missing production values

  - invalid_percent(production_mwh) = 0:
      valid min: 0
      name: Production MWh is non-negative

  - duplicate_count(country_code, source_code, production_date) = 0:
      name: No duplicate entries per country/source/date

  - avg(production_mwh) > 0:
      name: Average production is positive

  - min(production_mwh) >= 0:
      name: Min production is non-negative