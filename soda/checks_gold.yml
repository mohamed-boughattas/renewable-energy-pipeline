checks for gld_monthly_production_summary:
  - row_count > 0:
      name: Table is not empty

  - missing_count(country_code) = 0
  - missing_count(year_month) = 0
  - missing_count(total_production_mwh) = 0
  - missing_count(renewable_share_pct) = 0

  - invalid_percent(renewable_share_pct) = 0:
      valid min: 0
      valid max: 100
      name: Renewable share is 0-100%

  - duplicate_count(country_code, year_month) = 0:
      name: No duplicate country/month entries

  - avg(renewable_share_pct) > 0:
      name: Average renewable share is positive

  - sum(total_production_mwh) > 0:
      name: Total production is positive

checks for gld_co2_savings_by_country:
  - row_count > 0:
      name: Table is not empty

  - missing_count(country_code) = 0
  - missing_count(year_month) = 0
  - missing_count(co2_avoided_tons) = 0

  - min(co2_avoided_tons) >= 0:
      name: CO2 avoided is non-negative

  - duplicate_count(country_code, year_month) = 0:
      name: No duplicate country/month entries

checks for gld_country_renewable_ranking:
  - row_count > 0:
      name: Table is not empty

  - missing_count(country_code) = 0
  - missing_count(avg_renewable_share_pct) = 0

  - invalid_percent(avg_renewable_share_pct) = 0:
      valid min: 0
      valid max: 100
      name: Renewable share is 0-100%

  - duplicate_count(country_code) = 0:
      name: No duplicate country entries