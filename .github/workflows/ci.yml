name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: ty
        run: uv run ty check src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pytest
        run: uv run pytest -v

  data-pipeline:
    name: Data Pipeline
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Clean dlt state
        run: rm -rf .dlt/pipelines

      - name: Ingest data
        run: uv run python -m renewable_energy_pipeline.pipeline
        env:
          EMBER_API_KEY: ${{ secrets.EMBER_API_KEY }}

      - name: dbt deps
        working-directory: dbt
        run: uv run dbt deps --profiles-dir .

      - name: dbt seed
        working-directory: dbt
        run: uv run dbt seed --profiles-dir .

      - name: dbt run
        working-directory: dbt
        run: uv run dbt run --profiles-dir .

      - name: dbt test
        working-directory: dbt
        run: uv run dbt test --profiles-dir .
