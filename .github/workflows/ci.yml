name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Ruff check
        run: uv run ruff check src/ tests/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run ty
        run: uv run ty check src/

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Run pytest
        run: uv run pytest -v

  data-pipeline:
    name: Data Pipeline
    runs-on: ubuntu-latest
    needs:
      - lint
      - typecheck
      - test

    env:
      EMBER_API_KEY: ${{ secrets.EMBER_API_KEY }}
      SOURCES__EMBER_SOURCE__API_KEY: ${{ secrets.EMBER_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Create data directory
        run: mkdir -p data

      - name: Create dlt config
        run: |
          mkdir -p .dlt

          cat > .dlt/config.toml << EOF
          pipeline_name = "ember_energy"
          dataset = "main"

          [normalize]
          newline_clearing = "during-load"
          EOF

          cat > .dlt/secrets.toml << EOF
          destination.duckdb.credentials = "data/renewable_energy.duckdb"
          EOF

      - name: Clean dlt state
        run: rm -rf .dlt/pipelines

      - name: Run ingestion pipeline
        run: uv run python -m renewable_energy_pipeline.pipeline

      - name: Install dbt dependencies
        working-directory: dbt
        run: uv run dbt deps --profiles-dir .

      - name: Run dbt seed
        working-directory: dbt
        run: uv run dbt seed --profiles-dir .

      - name: Run dbt models
        working-directory: dbt
        run: uv run dbt run --profiles-dir .

      - name: Run dbt tests
        working-directory: dbt
        run: uv run dbt test --profiles-dir .
